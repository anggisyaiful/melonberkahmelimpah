<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — melonberkahmelimpah</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a7a4a 0%, #2ecc71 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo .icon {
      font-size: 48px;
      display: block;
      margin-bottom: 8px;
    }

    .logo h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a7a4a;
      line-height: 1.3;
    }

    .logo p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      color: #333;
      transition: border-color .2s;
      outline: none;
    }

    input:focus {
      border-color: #2ecc71;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #1a7a4a, #2ecc71);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s;
    }

    .btn-login:hover { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #cc0000;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 14px;
      display: none;
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="icon">🍈</span>
      <h1>Melon Berkas Melimpah</h1>
      <p>Silakan login untuk melanjutkan</p>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Masukkan email" autocomplete="email"/>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password"/>
    </div>

    <button class="btn-login" id="btnLogin" onclick="login()">Masuk</button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="footer">Data tersimpan otomatis ke Supabase</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://bkukhtovptkwbuhypbuf.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ZC6-OGRdkgAIep7M3eJilA_ff8DdefU';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    // Kalau sudah login, langsung ke index
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'index.html';
    });

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnLogin');
      const err = document.getElementById('errorMsg');

      if (!email || !password) {
        showError('Email dan password wajib diisi.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Memproses...';
      err.style.display = 'none';

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        showError('Email atau password salah. Silakan coba lagi.');
        btn.disabled = false;
        btn.textContent = 'Masuk';
      } else {
        window.location.href = 'index.html';
      }
    }

    function showError(msg) {
      const err = document.getElementById('errorMsg');
      err.textContent = msg;
      err.style.display = 'block';
    }

    // Login dengan tekan Enter
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
