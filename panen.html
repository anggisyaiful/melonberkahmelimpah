<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panen - Pencatatan Budidaya Melon</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-emerald-50 via-slate-50 to-slate-100 text-slate-800 min-h-screen">
  <div class="max-w-3xl mx-auto min-h-screen flex flex-col">

    <div class="sticky top-0 z-20 shadow-md">
      <header class="bg-gradient-to-r from-emerald-600 to-green-500 text-white px-4 py-3">
        <div class="flex items-center gap-3">
          <a href="index.html" class="shrink-0 text-white/90 hover:text-white text-xl leading-none" aria-label="Kembali ke menu utama">&larr;</a>
          <div class="min-w-0">
            <h1 id="greenhouse-name" class="text-lg sm:text-xl font-bold truncate">🍈 Memuat...</h1>
            <p class="text-emerald-50 text-xs sm:text-sm mt-0.5">Panen</p>
          </div>
        </div>
      </header>
      <div class="flex flex-wrap items-end gap-2 bg-white border-b border-slate-200 px-3 py-2">
        <div>
          <label class="block text-[11px] text-slate-500 mb-0.5">Dari Tanggal</label>
          <input type="date" id="filter-dari" class="border border-slate-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
        <div>
          <label class="block text-[11px] text-slate-500 mb-0.5">Sampai Tanggal</label>
          <input type="date" id="filter-sampai" class="border border-slate-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
        <button id="filter-apply" type="button" class="px-3 py-1.5 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700">Terapkan</button>
        <button id="filter-reset" type="button" class="px-3 py-1.5 border border-slate-300 text-slate-600 rounded-lg text-sm font-medium hover:bg-slate-50">Reset</button>
      </div>
    </div>

    <main class="flex-1 p-4 space-y-4 pb-10">

      <form id="form-panen" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 space-y-3">
        <h2 class="font-semibold text-slate-700">Tambah Data Panen</h2>
        <div>
          <label class="block text-sm text-slate-600 mb-1">Tanggal Panen</label>
          <input type="date" name="tanggal_panen" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
        <div>
          <label class="block text-sm text-slate-600 mb-1">Jumlah Hasil Panen (kg)</label>
          <input type="number" name="jumlah_kg" min="0" step="0.1" required placeholder="0" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
        <div>
          <label class="block text-sm text-slate-600 mb-1">Keterangan</label>
          <textarea name="keterangan" rows="2" placeholder="Contoh: Grade A, Blok 1 (opsional)" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
        </div>
        <div class="flex gap-2">
          <button type="submit" id="panen-submit-btn" class="flex-1 bg-emerald-600 text-white py-2.5 rounded-lg font-medium hover:bg-emerald-700">Simpan</button>
          <button type="button" id="panen-cancel-btn" class="hidden px-4 py-2.5 rounded-lg border border-slate-300 text-slate-600 font-medium hover:bg-slate-50">Batal</button>
        </div>
      </form>

      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 flex flex-wrap justify-between items-center gap-2">
        <span class="text-sm text-slate-500">Total Hasil Panen</span>
        <span id="panen-total" class="font-bold text-emerald-600">0 kg</span>
        <button id="panen-export" type="button" class="w-full sm:w-auto text-xs px-3 py-1.5 bg-white border border-emerald-200 text-emerald-700 rounded-md font-medium hover:bg-emerald-50">Export Excel</button>
      </div>

      <div id="panen-list" class="space-y-2">
        <p class="text-center text-slate-400 py-6">Memuat...</p>
      </div>

    </main>

    <footer class="text-center text-xs text-slate-400 py-3">
      Data tersimpan otomatis ke Supabase
    </footer>
  </div>

  <div id="toast" class="hidden fixed bottom-4 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg shadow-lg text-sm text-white z-50"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script type="module" src="assets/js/filter.js"></script>
  <script type="module" src="assets/js/panen.js"></script>
</body>
</html>
