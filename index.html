<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pencatatan Budidaya Melon</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">
  <div class="max-w-3xl mx-auto min-h-screen bg-slate-100 flex flex-col">

    <header class="sticky top-0 z-20 shadow bg-emerald-600 text-white px-4 py-3">
      <h1 class="text-lg sm:text-xl font-bold">🍈 Pencatatan Budidaya Melon</h1>
      <p class="text-emerald-100 text-xs sm:text-sm mt-0.5">Pilih greenhouse untuk mulai mencatat</p>
    </header>

    <main class="flex-1 p-4 space-y-4 pb-10">

      <form id="form-greenhouse" class="bg-white rounded-xl shadow-sm border border-slate-100 p-4 space-y-3">
        <h2 class="font-semibold text-slate-700">Tambah Greenhouse</h2>
        <div>
          <label class="block text-sm text-slate-600 mb-1">Nama Greenhouse</label>
          <input type="text" name="nama" required placeholder="Contoh: Greenhouse A" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
        <div class="flex gap-2">
          <button type="submit" id="greenhouse-submit-btn" class="flex-1 bg-emerald-600 text-white py-2.5 rounded-lg font-medium hover:bg-emerald-700">Simpan</button>
          <button type="button" id="greenhouse-cancel-btn" class="hidden px-4 py-2.5 rounded-lg border border-slate-300 text-slate-600 font-medium hover:bg-slate-50">Batal</button>
        </div>
      </form>

      <div>
        <h2 class="font-semibold text-slate-700 mb-2">Daftar Greenhouse</h2>
        <div id="greenhouse-list" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <p class="text-center text-slate-400 py-6 col-span-full">Memuat...</p>
        </div>
      </div>

    </main>

    <footer class="text-center text-xs text-slate-400 py-3">
      Data tersimpan otomatis ke Supabase
    </footer>
  </div>

  <div id="toast" class="hidden fixed bottom-4 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg shadow-lg text-sm text-white z-50"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="assets/js/greenhouses.js"></script>
</body>
</html>
